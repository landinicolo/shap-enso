name: shap-enso
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11

  # --- core scientific stack ---
  - numpy
  - pandas
  - xarray
  - scikit-learn          # regression/classification metrics, label_binarize
  - dask                  # lazy xarray Zarr backends (.open_zarr / .compute)

  # --- data I/O ---
  - netcdf4               # xarray backend for ERA5 / GODAS .nc files
  - zarr                  # SHAP and preprocessed data stores
  - pydap                 # OPeNDAP backend for xarray (GODAS D20 streaming)
  - requests              # NOAA Niño 3.4 index download

  # --- config ---
  - pyyaml

  # --- regridding ---
  - xesmf                 # bilinear regridding to common 2° grid

  # --- visualization ---
  - matplotlib
  - cartopy               # spatial SHAP maps (fallback to imshow if absent)

  - pip
  - pip:
    - torch>=2.2          # LSTM / CNN — pip for CUDA-compatible wheel
    - shap>=0.44          # TreeExplainer, GradientExplainer, DeepExplainer
    - xgboost>=2.0        # XGBoost model
    - cdsapi              # Copernicus CDS API client (ERA5 download)
    - marimo              # interactive analysis notebooks
