experiment:
  name: "xgb_basin_3mo"
  seed: 42
  output_dir: "/glade/work/acsubram/GitRepos/shap-enso"

data:
  raw_dir: "/glade/work/acsubram/GitRepos/shap-enso/data/raw"
  processed_dir: "/glade/work/acsubram/GitRepos/shap-enso/data/processed"
  era5_variables:
    - sst
    - tauu    # zonal wind stress (eastward turbulent surface stress)
    - olr     # derived from top_net_thermal_radiation
    - slp     # mean sea level pressure
  # D20 (20°C isotherm depth) is sourced separately — ERA5 does not carry it natively.
  # Options: "godas" (NOAA ERDDAP) | "era5_ocean" (derived from ERA5 ocean temperature profiles)
  d20_source: "oras5"
  lat_slice: [-30.0, 30.0]
  lon_slice: [120.0, 290.0]   # 120°E–70°W on a 0–360 grid
  time_slice: ["1979-01", "2023-12"]
  climatology_years: ["1981-01", "2010-12"]   # baseline for anomaly computation
  train_years: [1979, 2005]
  val_years:   [2006, 2014]
  test_years:  [2015, 2023]
  target_variable: "nino34"
  lead_months: [3, 6, 12]
  lag_months: 3               # number of lagged months to include as features

model:
  type: "xgboost"             # xgboost | lstm | cnn
  task: "regression"          # regression | classification
  xgb:
    n_estimators: 500
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    early_stopping_rounds: 30
  lstm:
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    sequence_length: 12
    batch_size: 64
    max_epochs: 100
    lr: 1.0e-3
  cnn:
    channels: [32, 64, 128]
    kernel_size: 3
    dropout: 0.3
    batch_size: 32
    max_epochs: 100
    lr: 1.0e-3

shap:
  background_samples: 200
  max_eval_samples: 500
  # xgboost -> tree, lstm -> gradient, cnn -> deep
  explainer_type: "tree"
  save_values: true
  output_dir: "/glade/work/acsubram/GitRepos/shap-enso/data/shap"

hpc:
  account: "UCUB0143"
  queue_cpu: "casper"
  queue_gpu: "gpudev"
  walltime_preprocess: "04:00:00"
  walltime_train_cpu:  "08:00:00"
  walltime_train_gpu:  "04:00:00"
  walltime_shap:       "12:00:00"
  ncpus: 8
  ngpus: 1
  mem: "64GB"
